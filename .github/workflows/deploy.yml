name: 🚀 Deploy BookShelf to Cloudflare

on:
  push:
    branches:
      - main          # 프로덕션 배포
      - staging       # 스테이징 배포

  pull_request:
    branches:
      - main          # PR 시 빌드 검증만 (배포 없음)

  workflow_dispatch:  # 수동 트리거

# ─── 동시 배포 방지 ───────────────────────────────────────────
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. 코드 품질 검사
  # ─────────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

  # ─────────────────────────────────────────────────────────────
  # 2. 빌드 검증
  # ─────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build PWA
        run: npm run build
        env:
          VITE_APP_ENV: production
          VITE_API_BASE_URL: ''
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # 3. 프로덕션 배포 (main 브랜치만)
  # ─────────────────────────────────────────────────────────────
  deploy-production:
    name: 🌐 Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://bookshelf-api.kordokrip.workers.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          wranglerVersion: '4'

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply bookshelf-db --remote
          wranglerVersion: '4'

      - name: Verify deployment
        run: |
          sleep 10
          curl -sf https://bookshelf-api.kordokrip.workers.dev/api/health \
            | tee /dev/stderr | grep -q '"status":"ok"' \
            && echo "✅ Health check passed" \
            || echo "⚠️ Health check failed — deployment may still be propagating"

      - name: Notify deployment result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Production 배포 성공: ${{ github.sha }}"
          else
            echo "❌ Production 배포 실패: ${{ github.sha }}"
            echo "::error::Production deployment failed. Check logs above."
          fi

  # ─────────────────────────────────────────────────────────────
  # 4. 스테이징 배포 (staging 브랜치만)
  # ─────────────────────────────────────────────────────────────
  deploy-staging:
    name: 🧪 Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Deploy to Cloudflare Workers (Staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging
          wranglerVersion: '4'

      - name: Notify staging result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Staging 배포 성공: ${{ github.sha }}"
          else
            echo "❌ Staging 배포 실패: ${{ github.sha }}"
          fi
