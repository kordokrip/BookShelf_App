# ═══════════════════════════════════════════════════════════════
# BookShelf — Cloudflare Workers 설정
# worker/types.ts Bindings 인터페이스와 1:1 매핑
# ═══════════════════════════════════════════════════════════════

name = "bookshelf-api"
main = "worker/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
account_id = "544c335c41ce3cd6f43b32cce9f15aaa"

# ─── 로컬 개발 ───────────────────────────────────────────────
[dev]
port = 8787
local_protocol = "http"

# ─── D1 데이터베이스 ─────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "bookshelf-db"
database_id = "013db269-dc7a-4a60-9920-ed40c12ab623"
migrations_dir = "worker/db/migrations"

# ─── KV Namespaces ───────────────────────────────────────────
# @deprecated: JWT Refresh Token 저장 용도는 KV 바인딩으로 이전됨.
# SESSIONS 바인딩은 현재 사용되지 않으며 차후 제거 예정.
# 세션 / JWT Refresh Token 저장
[[kv_namespaces]]
binding = "SESSIONS"
id = "3cb76beb5e9e49b3be2373d3f2a84972"
preview_id = "5a7a6a79089849898491a7000cc5de1c"

# AI 캐시 + 범용 KV
[[kv_namespaces]]
binding = "KV"
id = "a5414ccd302444ddb71a1e8b66eb5a28"
preview_id = "350e1010be544d02826e1a6f82a0044f"

# ─── Workers Assets — SPA 정적 파일 서빙 ─────────────────────
# dist/ 빌드 결과물을 ASSETS 바인딩으로 주입 → worker/index.ts의 SPA 폴백 라우트
[assets]
directory = "./dist"
binding = "ASSETS"

# ─── R2 Object Storage ───────────────────────────────────────
# 책 표지 이미지 업로드 저장소
[[r2_buckets]]
binding = "R2"
bucket_name = "bookshelf-covers"

# ─── Workers AI ──────────────────────────────────────────────
[ai]
binding = "AI"

# ─── Cron Trigger — 독서 리마인더 (매일 오전 8시 UTC = KST 17시) ─
[triggers]
crons = ["0 8 * * *"]

# ─── 환경 변수 (비밀값은 wrangler secret put 사용) ────────────
[vars]
ENVIRONMENT = "production"
APP_NAME = "BookShelf"
FRONTEND_URL = "https://bookshelf-api.kordokrip.workers.dev"
# ALLOWED_EMAILS 는 wrangler secret put ALLOWED_EMAILS 로 등록 (vars와 동시 사용 불가)

# ─── 옵저버빌리티 ────────────────────────────────────────────
[observability]
enabled = true

# ─── 로컬 개발 환경 (wrangler dev --env local) ───────────────
[env.local.vars]
ENVIRONMENT = "local"

# ─── 스테이징 환경 ───────────────────────────────────────────
[env.staging]
name = "bookshelf-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"


