
  <!DOCTYPE html>
  <html lang="ko">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
      <meta name="theme-color" content="#4F46E5" />
      <meta name="description" content="독서 기록, 읽는 중, 위시리스트를 한 곳에서 관리하는 개인 독서 트래커" />

      <!-- PWA -->
      <link rel="manifest" href="/manifest.json" />
      <link rel="apple-touch-icon" href="/icons/icon-192.png" />
      <meta name="mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-status-bar-style" content="default" />
      <meta name="apple-mobile-web-app-title" content="BookShelf" />
      <!-- 카메라 접근을 위한 Permissions Policy -->
      <meta http-equiv="Permissions-Policy" content="camera=*" />

      <!-- Open Graph -->
      <meta property="og:type" content="website" />
      <meta property="og:title" content="BookShelf — 나의 독서 기록" />
      <meta property="og:description" content="독서 기록, 읽는 중, 위시리스트를 한 곳에서 관리" />
      <meta property="og:image" content="/icons/icon-512.png" />

      <title>BookShelf — 나의 독서 기록</title>
    </head>

    <body>
      <div id="root"></div>
      <!--
        청크 로드 오류 안전망 — 구 SW 코드에서도 동작 (Swift to new version)
        React가 마운트되기 전 unhandledrejection 이벤트를 잡아 1회 reload
        sessionStorage flag로 무한 루프 방지
      -->
      <script>
        window.addEventListener('unhandledrejection', function (ev) {
          var msg = ev && ev.reason && ev.reason.message || '';
          if (/failed to fetch dynamically imported module/i.test(msg)) {
            var KEY = 'chunk_reload_attempted';
            if (!sessionStorage.getItem(KEY)) {
              sessionStorage.setItem(KEY, '1');
              window.location.reload();
            }
          }
        });
      </script>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
