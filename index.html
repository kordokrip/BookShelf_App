
  <!DOCTYPE html>
  <html lang="ko">
    <head>
      <meta charset="UTF-8" />
      <!--
        interactive-widget=resizes-content: 가상 키보드가 올라올 때
        viewport를 줄이는 대신 콘텐츠 영역을 재계산
        → iOS Safari/Android Chrome 일관적인 동작 보장
      -->
      <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
      <!-- 다크/라이트 모드 theme-color 분기 -->
      <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
      <meta name="theme-color" content="#0F172A" media="(prefers-color-scheme: dark)" />
      <meta name="description" content="독서 기록, 읽는 중, 위시리스트를 한 곳에서 관리하는 개인 독서 트래커" />

      <!-- PWA -->
      <link rel="manifest" href="/manifest.json" />
      <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
      <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
      <meta name="mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-capable" content="yes" />
      <!-- black-translucent: 노치/Dynamic Island 아래까지 콘텐츠 확장 -->
      <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
      <meta name="apple-mobile-web-app-title" content="BookShelf" />
      <!-- iOS/Android 자동 포맷 감지 비활성화 (레이아웃 깨짐 방지) -->
      <meta name="format-detection" content="telephone=no, date=no, email=no, address=no" />
      <!-- 카메라 접근을 위한 Permissions Policy -->
      <meta http-equiv="Permissions-Policy" content="camera=*" />

      <!-- Open Graph -->
      <meta property="og:type" content="website" />
      <meta property="og:title" content="BookShelf — 나의 독서 기록" />
      <meta property="og:description" content="독서 기록, 읽는 중, 위시리스트를 한 곳에서 관리" />
      <meta property="og:image" content="/icons/icon-512.png" />

      <title>BookShelf — 나의 독서 기록</title>
    </head>

    <body>
      <div id="root"></div>
      <!--
        청크 로드 오류 안전망 — 구 SW 코드에서도 동작 (Swift to new version)
        React가 마운트되기 전 unhandledrejection 이벤트를 잡아 1회 reload
        sessionStorage flag로 무한 루프 방지
      -->
      <script>
        window.addEventListener('unhandledrejection', function (ev) {
          var msg = ev && ev.reason && ev.reason.message || '';
          if (/failed to fetch dynamically imported module/i.test(msg)) {
            var KEY = 'chunk_reload_attempted';
            if (!sessionStorage.getItem(KEY)) {
              sessionStorage.setItem(KEY, '1');
              window.location.reload();
            }
          }
        });
      </script>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
